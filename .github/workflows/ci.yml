name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup tools (node / pnpm / pinact via mise)
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2

      - name: Verify GitHub Actions are pinned (pinact)
        run: pinact run --check --verify

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm fmt:check

      - name: Test (vitest)
        run: pnpm test:run

      - name: Build
        run: pnpm build
